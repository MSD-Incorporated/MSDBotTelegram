name: 🧹 Format

on:
    push:
        paths:
            - "packages/*/src/**"
            - "apps/*/src/**"
    pull_request:
        branches:
            - main
        paths:
            - "packages/*/src/**"
            - "apps/*/src/**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    format:
        permissions:
            contents: write
        runs-on: ubuntu-latest

        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.head_ref }}

            - name: 🛠️ Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: 🧹 Format
              run: bunx oxfmt --write '{.github,apps,packages}/**/*.{js,ts,json,md,yml,yaml}'

            - name: 💾 Commit changes
              uses: stefanzweifel/git-auto-commit-action@v6
              with:
                  commit_message: Apply formatting changes
                  branch: ${{ github.head_ref }}
