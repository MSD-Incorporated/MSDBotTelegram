name: msdbot_telegram

services:
    database:
        image: postgres:16-alpine
        container_name: database
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        volumes:
            - database:/var/lib/postgresql/data
        networks:
            - msdbot_network
        deploy:
            resources:
                limits:
                    cpus: "1.0"
                    memory: 512M
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 10s

    telegram-bot-api:
        image: aiogram/telegram-bot-api:latest
        container_name: telegram-bot-api
        entrypoint: ["sh", "-c"]
        command:
            - |
                sed -i 's/^telegram-bot-api:x:[0-9]*:[0-9]*:/telegram-bot-api:x:10001:10001:/' /etc/passwd &&
                sed -i 's/^telegram-bot-api:x:[0-9]*:/telegram-bot-api:x:10001:/' /etc/group &&
                chown -R 10001:10001 /var/lib/telegram-bot-api &&
                exec /docker-entrypoint.sh
        environment:
            - TELEGRAM_API_ID=${TELEGRAM_API_ID}
            - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
            - TELEGRAM_LOCAL=true
        tmpfs:
            - /tmp/telegram-bot-api:uid=10001,gid=10001,mode=1770,size=64m
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        cap_add:
            - CHOWN
            - SETUID
            - SETGID
            - DAC_OVERRIDE
            - FOWNER
        volumes:
            - /etc/timezone:/etc/timezone:ro
            - telegram_api_data:/var/lib/telegram-bot-api
        networks:
            - msdbot_network
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 256M
        healthcheck:
            test: ["CMD-SHELL", "wget -S -O /dev/null http://127.0.0.1:8081/ 2>&1 | grep -q '404' || exit 1"]
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 10s

    bot:
        build:
            context: ./
            dockerfile: ./Dockerfile
        image: mased/msdbot_telegram
        container_name: msdbot_telegram
        environment:
            - BOT_TOKEN=${BOT_TOKEN}
            - LOCAL_API

            - POSTGRES_HOST=${POSTGRES_HOST:-database}
            - POSTGRES_PORT=${POSTGRES_PORT:-5432}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}

            - SAUCENAO_TOKEN=${SAUCENAO_TOKEN}
            - GELBOORU_USER_ID=${GELBOORU_USER_ID}
            - GELBOORU_API_KEY=${GELBOORU_API_KEY}

            - NODE_ENV=prod
            - TZ=${TZ-Europe/Moscow}
        user: "10001:10001"
        read_only: true
        tmpfs:
            - /tmp:mode=1777,size=128m
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        volumes:
            - telegram_api_data:/var/lib/telegram-bot-api
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 256M
        restart: always
        networks:
            - msdbot_network
        depends_on:
            database:
                condition: service_healthy
            telegram-bot-api:
                condition: service_healthy

    watchtower:
        image: containrrr/watchtower:1.7.1
        container_name: watchtower
        read_only: true
        tmpfs:
            - /tmp:mode=1777,size=16m
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        volumes:
            - ${HOME-~}/.docker/config.json:/config.json:ro
            - /var/run/docker.sock:/var/run/docker.sock
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 128M
        command: msdbot_telegram --cleanup --interval 60 --api-version 1.44

networks:
    msdbot_network:
        name: msdbot_network
        driver: bridge

volumes:
    database:
        name: database
    telegram_api_data:
        name: telegram_api_data
